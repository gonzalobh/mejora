<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mejora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf9;
      --surface: #ffffff;
      --surface-2: #f5f5f3;
      --border: #e9e9e6;
      --border-subtle: #f0f0ee;
      --text: #181816;
      --text-2: #6b6b67;
      --text-3: #b8b8b3;
      --accent: #1d6fe0;
      --accent-bg: #eff6ff;
      --accent-border: #bfdbfe;
      --green: #16a34a;
      --green-bg: #f0fdf4;
      --green-border: #bbf7d0;
      --red: #dc2626;
      --red-bg: #fef2f2;
      --red-border: #fecaca;
      --diff-add: #dcfce7;
      --diff-add-text: #15803d;
      --diff-del: #fee2e2;
      --diff-del-text: #b91c1c;
      --radius: 7px;
      --font: 'DM Sans', -apple-system, sans-serif;
      --mono: 'DM Mono', monospace;
      --shadow: 0 1px 2px rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.04);
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      padding: 0 18px;
      height: 46px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      justify-content: space-between;
    }

    .header__brand { display: flex; align-items: center; gap: 10px; }
    .logo { font-size: 14px; font-weight: 500; color: var(--text); letter-spacing: -0.2px; }
    .sep { width: 1px; height: 14px; background: var(--border); }
    .header__tagline { font-size: 12.5px; color: var(--text-2); }

    .auto-pill {
      display: none;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      border-radius: 100px;
      padding: 3px 9px;
    }
    .auto-pill.on { display: flex; }
    .auto-pill::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1s ease-in-out infinite;
    }

    /* ── Dialect toggle ── */
    .dialect-toggle {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .dialect-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      font-size: 12px;
      font-family: var(--font);
      font-weight: 400;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-2);
      transition: all 0.1s;
      line-height: 1.4;
      white-space: nowrap;
    }
    .dialect-btn + .dialect-btn { border-left: 1px solid var(--border); }
    .dialect-btn.active {
      background: var(--text);
      color: #fff;
      font-weight: 500;
    }
    .dialect-btn:hover:not(.active) { background: var(--surface-2); }

    /* ── Context chips ── */
    .context-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 7px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .context-bar::-webkit-scrollbar { display: none; }

    .context-label {
      font-size: 11px;
      color: var(--text-3);
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-right: 4px;
      flex-shrink: 0;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 11px;
      border-radius: 100px;
      font-size: 12.5px;
      font-weight: 400;
      font-family: var(--font);
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      transition: all 0.1s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .chip:hover { background: var(--surface-2); color: var(--text); }
    .chip.active {
      background: var(--text);
      border-color: var(--text);
      color: #fff;
      font-weight: 500;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .toolbar__gap { flex: 1; }

    .status {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-2);
    }
    .status.on { display: flex; }
    .status__dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.1s ease-in-out infinite;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.12s ease;
      white-space: nowrap;
      line-height: 1;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      padding: 6px 13px;
      box-shadow: var(--shadow);
    }
    .btn-primary:hover:not(:disabled) { background: #1660c7; }
    .btn-primary.loading { color: transparent; position: relative; pointer-events: none; }
    .btn-primary.loading::after {
      content: '';
      position: absolute; inset: 0; margin: auto;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text-2);
      padding: 6px 11px;
      border-color: var(--border);
    }
    .btn-secondary:hover:not(:disabled) { background: var(--surface-2); color: var(--text); }

    .btn-ghost {
      background: transparent;
      color: var(--text-2);
      padding: 3px 7px;
      font-size: 12px;
      font-weight: 400;
    }
    .btn-ghost:hover:not(:disabled) { background: var(--surface-2); color: var(--text); }
    .btn-ghost.copied { color: var(--green); }

    .btn-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--text-2);
      padding: 4px;
      border-radius: 5px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.12s;
    }
    .btn-icon:hover { background: var(--surface-2); color: var(--text); border-color: var(--border); }
    .btn-icon.speaking {
      color: var(--accent);
      background: var(--accent-bg);
      border-color: var(--accent-border);
      animation: speakPulse 1.2s ease-in-out infinite;
    }

    /* ── Error ── */
    .error-bar {
      display: none;
      align-items: center;
      gap: 7px;
      padding: 7px 18px;
      background: var(--red-bg);
      border-bottom: 1px solid var(--red-border);
      color: var(--red);
      font-size: 13px;
      flex-shrink: 0;
    }
    .error-bar.on { display: flex; }

    /* ── Workspace ── */
    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Panel ── */
    .panel {
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid var(--border);
      overflow: hidden;
      background: var(--surface);
    }
    .panel:last-child { border-right: none; }

    .panel__hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      height: 34px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
      flex-shrink: 0;
      gap: 8px;
    }

    .panel__hd-left { display: flex; align-items: center; gap: 7px; }

    .panel__title { font-size: 11.5px; font-weight: 500; color: var(--text); }

    .lang-pill {
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.07em;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--accent-bg);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      font-family: var(--mono);
    }
    .lang-pill.en { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }

    .panel__hd-right { display: flex; align-items: center; gap: 3px; }

    /* diff toggle */
    .diff-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 5px;
      overflow: hidden;
    }
    .diff-toggle__btn {
      padding: 3px 8px;
      font-size: 11px;
      font-family: var(--font);
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-2);
      transition: all 0.1s;
      line-height: 1.4;
    }
    .diff-toggle__btn + .diff-toggle__btn { border-left: 1px solid var(--border); }
    .diff-toggle__btn.active { background: var(--text); color: #fff; }
    .diff-toggle__btn:hover:not(.active) { background: var(--surface-2); }

    /* diff stats */
    .diff-stats {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-family: var(--mono);
    }
    .diff-stats.on { display: flex; }
    .diff-stat-add { color: var(--green); }
    .diff-stat-del { color: var(--red); }

    /* Panel body */
    .panel__body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    textarea {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-family: var(--font);
      font-size: 13.5px;
      line-height: 1.7;
      font-weight: 400;
      padding: 14px 16px;
      resize: none;
      min-height: 0;
    }
    textarea::placeholder { color: var(--text-3); font-style: italic; }
    textarea[readonly] { cursor: default; }

    /* diff view */
    .diff-view {
      display: none;
      flex: 1;
      padding: 14px 16px;
      overflow-y: auto;
      font-size: 13.5px;
      line-height: 1.7;
      color: var(--text);
      word-break: break-word;
    }
    .diff-view.visible { display: block; }

    .diff-ins {
      background: var(--diff-add);
      color: var(--diff-add-text);
      border-radius: 3px;
      padding: 0 2px;
    }
    .diff-del {
      background: var(--diff-del);
      color: var(--diff-del-text);
      border-radius: 3px;
      padding: 0 2px;
      text-decoration: line-through;
      opacity: 0.7;
    }

    /* Panel footer */
    .panel__ft {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 12px;
      border-top: 1px solid var(--border);
      background: var(--surface-2);
      flex-shrink: 0;
    }

    .char-count { font-size: 11px; color: var(--text-3); font-family: var(--mono); }

    /* Empty hint */
    .empty-hint {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--text-3);
      font-size: 13px;
      pointer-events: none;
      text-align: center;
    }
    .panel.has-content .empty-hint { display: none; }

    /* Skeleton */
    .skel { display: none; flex-direction: column; gap: 8px; padding: 14px 16px; }
    .panel.fetching .skel { display: flex; }
    .panel.fetching textarea,
    .panel.fetching .diff-view { display: none !important; }
    .panel.fetching .empty-hint { display: none; }

    .skel-ln {
      height: 12px;
      border-radius: 4px;
      background: linear-gradient(90deg, #f0f0ee 25%, #e6e6e3 50%, #f0f0ee 75%);
      background-size: 300%;
      animation: shimmer 1.3s infinite;
    }
    .skel-ln:nth-child(2) { width: 83%; }
    .skel-ln:nth-child(3) { width: 71%; }
    .skel-ln:nth-child(4) { width: 90%; }
    .skel-ln:nth-child(5) { width: 62%; }

    /* Animations */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.25; } }
    @keyframes shimmer { 0% { background-position:100% 0; } 100% { background-position:-100% 0; } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:translateY(0); } }
    @keyframes speakPulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

    .anim { animation: fadeUp 0.2s ease both; }

    @media (max-width: 860px) {
      .workspace { grid-template-columns: 1fr; grid-template-rows: repeat(3, 1fr); }
      .panel { border-right: none; border-bottom: 1px solid var(--border); }
      .panel:last-child { border-bottom: none; }
      .header__tagline { display: none; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header__brand">
      <span class="logo">Mejora</span>
      <div class="sep"></div>
      <span class="header__tagline">Edición y traducción inteligente</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="dialect-toggle">
        <button class="dialect-btn active" data-dialect="us" title="American English">🇺🇸 US</button>
        <button class="dialect-btn" data-dialect="uk" title="British English">🇬🇧 UK</button>
      </div>
      <div id="autoPill" class="auto-pill">Auto</div>
    </div>
  </header>

  <!-- Context chips -->
  <div class="context-bar">
    <span class="context-label">Contexto</span>
    <button class="chip active" data-ctx="general">✦ General</button>
    <button class="chip" data-ctx="email">✉ Email</button>
    <button class="chip" data-ctx="slack">⚡ Slack</button>
    <button class="chip" data-ctx="formal">◈ Formal</button>
    <button class="chip" data-ctx="report">◻ Reporte</button>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn btn-primary" id="mejorarBtn">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
        <path d="M8 1.5l1.4 4.1H14l-3.6 2.6 1.4 4.2L8 10 4.2 12.4l1.4-4.2L2 5.6h4.6z" fill="currentColor"/>
      </svg>
      Mejorar
    </button>
    <button class="btn btn-secondary" id="limpiarBtn">Limpiar</button>
    <div class="toolbar__gap"></div>
    <div class="status" id="statusEl">
      <span class="status__dot"></span>
      Procesando...
    </div>
  </div>

  <!-- Error -->
  <div class="error-bar" id="errorBar" role="alert" aria-live="assertive">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
      <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
      <path d="M8 5v3.5M8 11h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <span id="errorText"></span>
  </div>

  <!-- Workspace -->
  <div class="workspace">

    <!-- Panel 1: Entrada -->
    <div class="panel" id="p-input">
      <div class="panel__hd">
        <div class="panel__hd-left">
          <span class="panel__title">Entrada</span>
          <span class="lang-pill">ES</span>
        </div>
        <div class="panel__hd-right">
          <button class="btn btn-ghost" data-copy="inputText">Copiar</button>
        </div>
      </div>
      <div class="panel__body">
        <textarea id="inputText" placeholder="Escribe aquí tu texto en español..." spellcheck="true"></textarea>
      </div>
      <div class="panel__ft">
        <span class="char-count" id="cnt-input">0</span>
      </div>
    </div>

    <!-- Panel 2: Mejorado + Diff -->
    <div class="panel" id="p-mejorado">
      <div class="panel__hd">
        <div class="panel__hd-left">
          <span class="panel__title">Mejorado</span>
          <span class="lang-pill">ES</span>
          <div class="diff-stats" id="diffStats">
            <span class="diff-stat-add" id="statAdd">+0</span>
            <span class="diff-stat-del" id="statDel">−0</span>
          </div>
        </div>
        <div class="panel__hd-right">
          <div class="diff-toggle">
            <button class="diff-toggle__btn active" data-view="text">Texto</button>
            <button class="diff-toggle__btn" data-view="diff">Diff</button>
          </div>
          <button class="btn btn-ghost" data-copy="mejoradoText" style="margin-left:4px">Copiar</button>
        </div>
      </div>
      <div class="panel__body">
        <div class="skel">
          <div class="skel-ln"></div><div class="skel-ln"></div>
          <div class="skel-ln"></div><div class="skel-ln"></div>
          <div class="skel-ln"></div>
        </div>
        <div class="empty-hint">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <span>Presiona Mejorar</span>
        </div>
        <textarea id="mejoradoText" readonly placeholder=""></textarea>
        <div class="diff-view" id="diffView"></div>
      </div>
      <div class="panel__ft">
        <span class="char-count" id="cnt-mejorado">—</span>
      </div>
    </div>

    <!-- Panel 3: Traducción -->
    <div class="panel" id="p-english">
      <div class="panel__hd">
        <div class="panel__hd-left">
          <span class="panel__title">Traducción</span>
          <span class="lang-pill en">EN</span>
        </div>
        <div class="panel__hd-right">
          <!-- TTS button with Lucide icon -->
          <button class="btn-icon" id="ttsBtn" title="Escuchar en inglés">
            <i data-lucide="volume-2" style="width:14px;height:14px"></i>
          </button>
          <button class="btn btn-ghost" data-copy="englishText">Copiar</button>
        </div>
      </div>
      <div class="panel__body">
        <div class="skel">
          <div class="skel-ln"></div><div class="skel-ln"></div>
          <div class="skel-ln"></div><div class="skel-ln"></div>
          <div class="skel-ln"></div>
        </div>
        <div class="empty-hint">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M5 8h14M5 12h10M5 16h6"/></svg>
          <span>La traducción aparecerá aquí</span>
        </div>
        <textarea id="englishText" readonly placeholder=""></textarea>
      </div>
      <div class="panel__ft">
        <span class="char-count" id="cnt-english">—</span>
      </div>
    </div>

  </div>
</div>

<script>
// ── Lucide icons ─────────────────────────────────────────────────────────────
lucide.createIcons();

// ── Diff engine (word-level) ─────────────────────────────────────────────────
function computeDiff(oldStr, newStr) {
  const oldTokens = oldStr.split(/(\s+)/);
  const newTokens = newStr.split(/(\s+)/);
  const lcs = getLCS(oldTokens, newTokens);
  return buildHTML(oldTokens, newTokens, lcs);
}

function getLCS(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, () => new Uint16Array(n + 1));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
  const res = []; let i = m, j = n;
  while (i > 0 && j > 0) {
    if (a[i-1] === b[j-1]) { res.unshift([i-1, j-1]); i--; j--; }
    else if (dp[i-1][j] >= dp[i][j-1]) i--; else j--;
  }
  return res;
}

function buildHTML(ot, nt, lcs) {
  const html = []; let oi = 0, ni = 0, li = 0, add = 0, del = 0;
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  while (oi < ot.length || ni < nt.length) {
    const lo = li < lcs.length ? lcs[li][0] : -1, ln = li < lcs.length ? lcs[li][1] : -1;
    if (li < lcs.length && oi === lo && ni === ln) { html.push(esc(ot[oi])); oi++; ni++; li++; }
    else {
      while (oi < ot.length && (li >= lcs.length || oi < lo)) {
        const t = ot[oi]; if (t.trim()) { html.push(`<del class="diff-del">${esc(t)}</del>`); del++; } else html.push(esc(t)); oi++;
      }
      while (ni < nt.length && (li >= lcs.length || ni < ln)) {
        const t = nt[ni]; if (t.trim()) { html.push(`<ins class="diff-ins">${esc(t)}</ins>`); add++; } else html.push(esc(t)); ni++;
      }
    }
  }
  return { html: html.join(''), add, del };
}

// ── App ──────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

const inputText    = $('inputText');
const mejoradoText = $('mejoradoText');
const englishText  = $('englishText');
const mejorarBtn   = $('mejorarBtn');
const limpiarBtn   = $('limpiarBtn');
const statusEl     = $('statusEl');
const errorBar     = $('errorBar');
const errorText    = $('errorText');
const autoPill     = $('autoPill');
const diffView     = $('diffView');
const diffStats    = $('diffStats');
const statAdd      = $('statAdd');
const statDel      = $('statDel');
const ttsBtn       = $('ttsBtn');

// Restore
const STORAGE_KEY = 'mejora:last-input';
inputText.value = localStorage.getItem(STORAGE_KEY) || '';
syncCount(inputText, 'cnt-input');

// ── Dialect toggle ───────────────────────────────────────────────────────────
let activeDialect = 'us';

document.querySelectorAll('.dialect-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.dialect === activeDialect) return;
    document.querySelectorAll('.dialect-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeDialect = btn.dataset.dialect;
    // Re-translate if there's already content
    const val = inputText.value.trim();
    if (val) { clearTimeout(timer); runMejorar(val); }
  });
});

// ── Context chips ────────────────────────────────────────────────────────────
let activeCtx = 'general';

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    if (chip.dataset.ctx === activeCtx) return; // no change
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeCtx = chip.dataset.ctx;

    // Auto-retranslate if there's text already processed
    const val = inputText.value.trim();
    if (val) {
      clearTimeout(timer);
      runMejorar(val);
    }
  });
});

// ── Diff toggle ──────────────────────────────────────────────────────────────
let diffMode = 'text';

document.querySelectorAll('.diff-toggle__btn').forEach(btn => {
  btn.addEventListener('click', () => {
    diffMode = btn.dataset.view;
    document.querySelectorAll('.diff-toggle__btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyDiffView();
  });
});

function applyDiffView() {
  const hasMejorado = !!mejoradoText.value;
  if (diffMode === 'diff' && hasMejorado) {
    mejoradoText.style.display = 'none';
    diffView.classList.add('visible');
  } else {
    mejoradoText.style.display = '';
    diffView.classList.remove('visible');
  }
}

// ── Auto-translate (1.5s debounce) ───────────────────────────────────────────
let timer = null;
let lastText = '';
let lastCtx  = '';

inputText.addEventListener('input', () => {
  localStorage.setItem(STORAGE_KEY, inputText.value);
  syncCount(inputText, 'cnt-input');
  clearTimeout(timer);
  const val = inputText.value.trim();
  if (!val) { autoPill.classList.remove('on'); return; }
  autoPill.classList.add('on');
  timer = setTimeout(() => {
    autoPill.classList.remove('on');
    if (val !== lastText || activeCtx !== lastCtx) runMejorar(val);
  }, 1500);
});

// ── Copy ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('[data-copy]').forEach(btn => {
  btn.addEventListener('click', async () => {
    const el = $(btn.dataset.copy);
    if (!el?.value.trim()) return;
    try {
      await navigator.clipboard.writeText(el.value);
      btn.textContent = '✓ Copiado';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 1400);
    } catch { showErr('No se pudo copiar.'); }
  });
});

// ── TTS ──────────────────────────────────────────────────────────────────────
let currentUtterance = null;

ttsBtn.addEventListener('click', () => {
  const text = englishText.value.trim();
  if (!text) return;

  // If speaking, stop
  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    ttsBtn.classList.remove('speaking');
    // Update icon back to volume-2
    ttsBtn.innerHTML = '<i data-lucide="volume-2" style="width:14px;height:14px"></i>';
    lucide.createIcons();
    currentUtterance = null;
    return;
  }

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';
  utterance.rate = 0.95;
  utterance.pitch = 1;

  // Try to pick a good English voice
  const voices = window.speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith('en') && v.localService) ||
                  voices.find(v => v.lang.startsWith('en'));
  if (enVoice) utterance.voice = enVoice;

  utterance.onstart = () => {
    ttsBtn.classList.add('speaking');
    ttsBtn.innerHTML = '<i data-lucide="volume-x" style="width:14px;height:14px"></i>';
    lucide.createIcons();
  };

  utterance.onend = utterance.onerror = () => {
    ttsBtn.classList.remove('speaking');
    ttsBtn.innerHTML = '<i data-lucide="volume-2" style="width:14px;height:14px"></i>';
    lucide.createIcons();
    currentUtterance = null;
  };

  currentUtterance = utterance;
  window.speechSynthesis.speak(utterance);
});

// Voices may load async
window.speechSynthesis.onvoiceschanged = () => {};

// ── Limpiar ──────────────────────────────────────────────────────────────────
limpiarBtn.addEventListener('click', () => {
  clearTimeout(timer);
  window.speechSynthesis.cancel();
  ttsBtn.classList.remove('speaking');
  ttsBtn.innerHTML = '<i data-lucide="volume-2" style="width:14px;height:14px"></i>';
  lucide.createIcons();

  inputText.value = mejoradoText.value = englishText.value = '';
  diffView.innerHTML = '';
  diffView.classList.remove('visible');
  mejoradoText.style.display = '';
  diffMode = 'text';
  document.querySelectorAll('.diff-toggle__btn').forEach((b,i) => b.classList.toggle('active', i===0));
  localStorage.removeItem(STORAGE_KEY);
  lastText = ''; lastCtx = '';
  clearErr(); hideStatus(); autoPill.classList.remove('on');
  $('cnt-input').textContent = '0';
  $('cnt-mejorado').textContent = $('cnt-english').textContent = '—';
  $('p-mejorado').classList.remove('has-content');
  $('p-english').classList.remove('has-content');
  diffStats.classList.remove('on');
});

// ── Mejorar button ───────────────────────────────────────────────────────────
mejorarBtn.addEventListener('click', () => {
  clearTimeout(timer);
  autoPill.classList.remove('on');
  runMejorar(inputText.value.trim());
});

// ── Core ─────────────────────────────────────────────────────────────────────
async function runMejorar(text) {
  if (!text) { showErr('Escribe un texto para continuar.'); return; }
  clearErr();
  setLoading(true);
  lastText = text;
  lastCtx  = activeCtx;

  // Stop any ongoing TTS
  window.speechSynthesis.cancel();
  ttsBtn.classList.remove('speaking');
  ttsBtn.innerHTML = '<i data-lucide="volume-2" style="width:14px;height:14px"></i>';
  lucide.createIcons();

  try {
    const res = await fetch('/api/mejorar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, context: activeCtx, dialect: activeDialect }),
    });

    let data = null;
    try { data = await res.json(); } catch {}
    if (!res.ok) { showErr(data?.error || 'No se pudo procesar.'); return; }
    if (!data)   { showErr('Respuesta inválida.'); return; }

    const mejorado = data.mejorado || '';
    const english  = data.english  || '';

    mejoradoText.value = mejorado;
    englishText.value  = english;

    // Compute diff
    if (mejorado && text) {
      const { html, add, del } = computeDiff(text, mejorado);
      diffView.innerHTML = html;
      statAdd.textContent = `+${add}`;
      statDel.textContent = `−${del}`;
      diffStats.classList.toggle('on', add > 0 || del > 0);
    }

    applyDiffView();
    $('p-mejorado').classList.add('has-content');
    $('p-english').classList.add('has-content');
    syncCount(mejoradoText, 'cnt-mejorado');
    syncCount(englishText,  'cnt-english');

    [mejoradoText, englishText, diffView].forEach(el => {
      el.classList.remove('anim'); void el.offsetWidth; el.classList.add('anim');
    });

  } catch (e) {
    showErr(e.message || 'Error de red.');
  } finally {
    setLoading(false);
  }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function setLoading(on) {
  mejorarBtn.disabled = on;
  mejorarBtn.classList.toggle('loading', on);
  statusEl.classList.toggle('on', on);
  ['p-mejorado', 'p-english'].forEach(id => $(id).classList.toggle('fetching', on));
  if (on) {
    mejoradoText.value = englishText.value = '';
    diffView.innerHTML = '';
    diffStats.classList.remove('on');
    $('cnt-mejorado').textContent = $('cnt-english').textContent = '—';
  }
}

function hideStatus() { statusEl.classList.remove('on'); }

function showErr(msg) {
  errorText.textContent = msg;
  errorBar.classList.add('on');
  setTimeout(() => errorBar.classList.remove('on'), 5000);
}
function clearErr() { errorBar.classList.remove('on'); }

function syncCount(ta, id) {
  const n = ta.value.length;
  $(id).textContent = n === 0 ? '0' : n.toLocaleString();
}
</script>
</body>
</html>
